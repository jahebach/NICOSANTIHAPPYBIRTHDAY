<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación Especial</title>
    <style>
        /* Ajuste para que se vea perfecto en teléfonos sin alargarse */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            text-align: center;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .contenedor {
            width: 100%;
            max-width: 450px; /* Tamaño ideal para celulares */
            background: #2a2a2a;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.5);
        }

        h1 {
            color: #ffcc00;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        /* ESCENA DE ANIMACIÓN (Estilo Minecraft) */
        .escena-animacion {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 200px;
            background: #3a3a3a;
            border: 4px solid #555;
            border-radius: 10px;
            margin: 20px 0;
            position: relative;
            overflow: hidden;
        }

        .personaje {
            width: 70px;
            height: auto;
            position: relative;
            /* Animación estilo juego pixelado/bloques */
            animation: bailarMinecraft 3s infinite linear;
        }

        /* Retraso para que el segundo personaje no se mueva igual y simule la rotación */
        #nicolas {
            animation-delay: 1.5s;
        }

        /* Animación estilo Minecraft: movimientos rígidos, saltos y cambio de posición */
        @keyframes bailarMinecraft {
            0% {
                transform: translateY(0px) rotate(0deg);
                left: 0px;
            }
            25% {
                transform: translateY(-20px) rotate(5deg); /* Salto rígido */
            }
            50% {
                transform: translateY(0px) rotate(-5deg);
                left: 40px; /* Se mueve de puesto */
            }
            75% {
                transform: translateY(-15px) rotate(0deg);
            }
            100% {
                transform: translateY(0px) rotate(0deg);
                left: 0px; /* Vuelve a su puesto */
            }
        }

        .nombre-personaje {
            font-weight: bold;
            font-size: 0.9rem;
            color: #00ffcc;
            margin-top: 5px;
        }

        /* SECCIÓN DE CONFIRMACIÓN (CARTA SMS) */
        .seccion-confirmacion {
            margin-top: 30px;
            background: #333;
            padding: 15px;
            border-radius: 10px;
        }

        .carta-sms {
            display: inline-block;
            background: #ffffff;
            color: #1a1a1a;
            padding: 15px 25px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.2s;
            border: 2px solid #ffcc00;
        }

        .carta-sms:active {
            transform: scale(0.95);
        }

        .icono-carta {
            font-size: 2rem;
            display: block;
            margin-bottom: 5px;
        }

        /* Botón oculto o discreto para la música */
        .btn-musica {
            background: #ffcc00;
            color: black;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <audio id="miMusica" autoplay loop>
        <source src="musica.mp3" type="audio/mpeg">
        Tu navegador no soporta este formato de audio.
    </audio>

    <div class="contenedor">
        <h1>¡Estás Invitado!</h1>
        <p>Acompaña a Santiago y Nicolás en esta gran aventura.</p>

        <div class="escena-animacion">
            <div>
                <img id="santiago" class="personaje" src="santiago.png" alt="Santiago de cuerpo completo">
                <div class="nombre-personaje">Santiago</div>
            </div>
            <div>
                <img id="nicolas" class="personaje" src="nicolas.png" alt="Nicolás de cuerpo completo">
                <div class="nombre-personaje">Nicolás</div>
            </div>
        </div>

        <p>Toca la pantalla si la música no empieza a sonar automáticamente.</p>
        <button class="btn-musica" onclick="reproducir()">🎵 Play / Pausa Música</button>

        <div class="seccion-confirmacion">
            <p>Confirma tu asistencia enviando un mensaje de texto aquí:</p>
            
            <a href="sms:+1234567890?body=Hola!%20Confirmo%20mi%20asistencia%20a%20la%20fiesta." class="carta-sms">
                <span class="icono-carta">✉️</span>
                Toca la Carta para enviar SMS
            </a>
        </div>
    </div>

    <script>
        // Función para intentar reproducir la música apenas el usuario interactúe con la página
        function reproducir() {
            var audio = document.getElementById("miMusica");
            if (audio.paused) {
                audio.play();
            } else {
                audio.pause();
            }
        }

        // Intenta reproducir automáticamente al hacer el primer clic en cualquier parte de la pantalla
        document.addEventListener('click', function() {
            var audio = document.getElementById("miMusica");
            audio.play();
        });
    </script>

</body>
</html>
